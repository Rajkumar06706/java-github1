name: PR Validation

on:
  pull_request:
    branches:
      - feature

permissions:
  actions: read
  contents: read
  security-events: write
  pull-requests: write

jobs:
  validate:
    uses: Rajkumar06706/java-github/.github/workflows/platform-pr.yml@main
    with:
      java-version: "17"
